<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Converter</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <!-- Ad Placeholder: Top Banner -->
    <div class="ad-slot ad-top-banner">
        <div class="ad-placeholder">Ad Space - 728x90</div>
    </div>

    <div class="container">
        <header>
            <h1>File Converter</h1>
            <p>Convert audio, image, and video files instantly</p>
        </header>

        <main>
            <div class="upload-section">
                <div class="drop-zone" id="dropZone">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <p>Drag & drop your file here</p>
                    <p class="or-text">or</p>
                    <button class="btn-browse" onclick="document.getElementById('fileInput').click()">Browse
                        Files</button>
                    <input type="file" id="fileInput" hidden>
                </div>

                <div class="file-info" id="fileInfo" style="display: none;">
                    <div class="file-details">
                        <span id="fileName"></span>
                        <span class="file-type" id="fileType"></span>
                    </div>
                    <button class="btn-remove" onclick="resetUpload()">×</button>
                </div>
            </div>

            <div class="conversion-section" id="conversionSection" style="display: none;">
                <label for="formatSearch">Convert to:</label>
                <div class="search-wrapper">
                    <input type="text" id="formatSearch" placeholder="Search format..." autocomplete="off">
                    <div class="format-dropdown" id="formatDropdown"></div>
                </div>
                <button class="btn-convert" id="convertBtn" disabled>Convert</button>
            </div>

            <div class="result-section" id="resultSection" style="display: none;">
                <div class="success-message">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                    <p>Conversion complete!</p>
                </div>
                <button class="btn-download" id="downloadBtn">Download File</button>
                <button class="btn-secondary" onclick="location.reload()">Convert Another</button>
            </div>

            <div class="error-message" id="errorMessage" style="display: none;"></div>
        </main>

        <!-- Ad Placeholder: Sidebar (optional) -->
        <aside class="ad-slot ad-sidebar">
            <div class="ad-placeholder">Ad Space<br>300x250</div>
        </aside>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
